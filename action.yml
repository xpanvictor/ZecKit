name: 'ZecKit Devnet'
description: 'Spin up a Zebra regtest devnet with faucet for Zcash development and E2E testing'
author: 'xpanvictor'
branding:
  icon: 'zap'
  color: 'yellow'

inputs:
  backend:
    description: 'Light client backend: zaino or lwd (lightwalletd)'
    required: false
    default: 'zaino'
  
  startup-timeout:
    description: 'Maximum time to wait for devnet startup (minutes)'
    required: false
    default: '30'
  
  min-blocks:
    description: 'Minimum blocks to mine before ready (101 for coinbase maturity)'
    required: false
    default: '101'
  
  run-e2e:
    description: 'Run golden E2E tests after startup'
    required: false
    default: 'false'
  
  working-directory:
    description: 'Working directory for ZecKit operations'
    required: false
    default: '.'

outputs:
  zebra-rpc:
    description: 'Zebra RPC endpoint URL'
    value: ${{ steps.devnet.outputs.zebra-rpc }}
  
  faucet-api:
    description: 'Faucet API endpoint URL'
    value: ${{ steps.devnet.outputs.faucet-api }}
  
  faucet-address:
    description: 'Pre-funded wallet address'
    value: ${{ steps.devnet.outputs.faucet-address }}
  
  block-height:
    description: 'Current block height'
    value: ${{ steps.devnet.outputs.block-height }}
  
  e2e-result:
    description: 'E2E test result (pass/fail/skipped)'
    value: ${{ steps.e2e.outputs.result }}

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        if [[ "${{ inputs.backend }}" != "zaino" && "${{ inputs.backend }}" != "lwd" ]]; then
          echo "::error::Invalid backend '${{ inputs.backend }}'. Must be 'zaino' or 'lwd'"
          exit 1
        fi
        echo "✓ Backend: ${{ inputs.backend }}"
        echo "✓ Timeout: ${{ inputs.startup-timeout }} minutes"
        echo "✓ Min blocks: ${{ inputs.min-blocks }}"

    - name: Check Docker availability
      shell: bash
      run: |
        if ! command -v docker &> /dev/null; then
          echo "::error::Docker is not installed"
          exit 1
        fi
        docker --version
        docker compose version

    - name: Clone ZecKit (if not in repo)
      shell: bash
      run: |
        if [[ ! -f "${{ inputs.working-directory }}/docker-compose.prebuilt.yml" ]]; then
          echo "Cloning ZecKit..."
          git clone --depth 1 https://github.com/xpanvictor/ZecKit.git /tmp/zeckit
          echo "ZECKIT_DIR=/tmp/zeckit" >> $GITHUB_ENV
        else
          echo "Using local ZecKit directory"
          echo "ZECKIT_DIR=${{ inputs.working-directory }}" >> $GITHUB_ENV
        fi

    - name: Download pre-mined snapshot
      shell: bash
      run: |
        echo "Downloading pre-mined blockchain snapshot..."
        mkdir -p /tmp/snapshot
        
        # Download from GitHub Releases
        SNAPSHOT_URL="https://github.com/xpanvictor/ZecKit/releases/download/snapshot-latest/blockchain-snapshot.tar.gz"
        
        if curl -sfL -o /tmp/snapshot/blockchain-snapshot.tar.gz "$SNAPSHOT_URL"; then
          echo "✓ Snapshot downloaded ($(ls -lh /tmp/snapshot/blockchain-snapshot.tar.gz | awk '{print $5}'))"
          echo "SNAPSHOT_AVAILABLE=true" >> $GITHUB_ENV
        else
          echo "⚠ Snapshot not available, will mine blocks from scratch"
          echo "SNAPSHOT_AVAILABLE=false" >> $GITHUB_ENV
        fi

    - name: Pull Docker images
      shell: bash
      run: |
        cd $ZECKIT_DIR
        echo "Pulling pre-built images for ${{ inputs.backend }} backend..."
        DOCKER_DEFAULT_PLATFORM=linux/amd64 docker compose -f docker-compose.prebuilt.yml --profile ${{ inputs.backend }} pull

    - name: Restore snapshot to volume
      if: env.SNAPSHOT_AVAILABLE == 'true'
      shell: bash
      run: |
        cd $ZECKIT_DIR
        echo "Restoring pre-mined blockchain snapshot..."
        
        # Get the project name that docker compose will use
        PROJECT_NAME=$(basename "$ZECKIT_DIR" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g')
        VOLUME_NAME="${PROJECT_NAME}_zebra-data"
        
        echo "Creating volume: $VOLUME_NAME"
        docker volume create "$VOLUME_NAME" || true
        
        # Restore snapshot to volume
        docker run --rm \
          -v "${VOLUME_NAME}:/data" \
          -v /tmp/snapshot:/backup:ro \
          alpine:latest \
          sh -c "cd /data && tar -xzf /backup/blockchain-snapshot.tar.gz"
        
        echo "✓ Snapshot restored to $VOLUME_NAME"

    - name: Start devnet
      id: devnet
      shell: bash
      run: |
        cd $ZECKIT_DIR
        
        echo "Starting ZecKit devnet with ${{ inputs.backend }} backend..."
        DOCKER_DEFAULT_PLATFORM=linux/amd64 docker compose -f docker-compose.prebuilt.yml --profile ${{ inputs.backend }} up -d
        
        # Wait for Zebra to be ready
        echo "Waiting for Zebra RPC..."
        SECONDS=0
        MAX_SECONDS=$(( ${{ inputs.startup-timeout }} * 60 ))
        
        until curl -sf --max-time 5 \
          --data-binary '{"jsonrpc":"2.0","id":"1","method":"getinfo","params":[]}' \
          -H 'content-type: application/json' \
          http://127.0.0.1:8232 > /dev/null 2>&1; do
          
          if [ $SECONDS -ge $MAX_SECONDS ]; then
            echo "::error::Zebra RPC not ready after ${{ inputs.startup-timeout }} minutes"
            docker compose -f docker-compose.prebuilt.yml logs zebra
            exit 1
          fi
          
          echo "Waiting for Zebra... ($SECONDS seconds)"
          sleep 10
        done
        echo "✓ Zebra RPC ready"
        
        # Wait for minimum blocks (skip long wait if snapshot was restored)
        echo "Waiting for ${{ inputs.min-blocks }} blocks..."
        SNAPSHOT_MODE="${{ env.SNAPSHOT_AVAILABLE }}"
        BLOCK_WAIT_TIMEOUT=$MAX_SECONDS
        
        # If snapshot was restored, blocks should already be there - use shorter timeout
        if [ "$SNAPSHOT_MODE" == "true" ]; then
          echo "Snapshot was restored, blocks should be ready quickly..."
          BLOCK_WAIT_TIMEOUT=120  # 2 minutes max for snapshot mode
        fi
        
        while true; do
          BLOCK_HEIGHT=$(curl -sf --max-time 5 \
            --data-binary '{"jsonrpc":"2.0","id":"1","method":"getblockcount","params":[]}' \
            -H 'content-type: application/json' \
            http://127.0.0.1:8232 | jq -r '.result // 0')
          
          if [ "$BLOCK_HEIGHT" -ge "${{ inputs.min-blocks }}" ]; then
            echo "✓ Block height: $BLOCK_HEIGHT"
            break
          fi
          
          if [ $SECONDS -ge $BLOCK_WAIT_TIMEOUT ]; then
            if [ "$SNAPSHOT_MODE" == "true" ]; then
              echo "::warning::Snapshot was restored but blocks not at expected height. Mining may be in progress."
            fi
            echo "::error::Did not reach ${{ inputs.min-blocks }} blocks within timeout"
            echo "Current height: $BLOCK_HEIGHT, Expected: ${{ inputs.min-blocks }}"
            exit 1
          fi
          
          echo "Current height: $BLOCK_HEIGHT / ${{ inputs.min-blocks }}"
          sleep 15
        done
        
        # Wait for faucet
        echo "Waiting for faucet API..."
        until curl -sf http://127.0.0.1:8080/health > /dev/null 2>&1; do
          if [ $SECONDS -ge $MAX_SECONDS ]; then
            echo "::error::Faucet not ready in time"
            exit 1
          fi
          sleep 5
        done
        echo "✓ Faucet API ready"
        
        # Get faucet address
        FAUCET_ADDRESS=$(curl -sf http://127.0.0.1:8080/address | jq -r '.address // "unknown"')
        echo "✓ Faucet address: $FAUCET_ADDRESS"
        
        # Set outputs
        echo "zebra-rpc=http://127.0.0.1:8232" >> $GITHUB_OUTPUT
        echo "faucet-api=http://127.0.0.1:8080" >> $GITHUB_OUTPUT
        echo "faucet-address=$FAUCET_ADDRESS" >> $GITHUB_OUTPUT
        echo "block-height=$BLOCK_HEIGHT" >> $GITHUB_OUTPUT
        
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  ZecKit Devnet Ready!"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  Zebra RPC:  http://127.0.0.1:8232"
        echo "  Faucet API: http://127.0.0.1:8080"
        echo "  Backend:    ${{ inputs.backend }}"
        echo "  Blocks:     $BLOCK_HEIGHT"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    - name: Run E2E tests
      id: e2e
      if: inputs.run-e2e == 'true'
      shell: bash
      run: |
        cd $ZECKIT_DIR
        
        echo "Running golden E2E tests..."
        
        if [[ -f "tests/e2e/golden-flow.sh" ]]; then
          chmod +x tests/e2e/golden-flow.sh
          if ./tests/e2e/golden-flow.sh; then
            echo "result=pass" >> $GITHUB_OUTPUT
            echo "✓ E2E tests passed"
          else
            echo "result=fail" >> $GITHUB_OUTPUT
            echo "::error::E2E tests failed"
            exit 1
          fi
        else
          echo "result=skipped" >> $GITHUB_OUTPUT
          echo "⚠ E2E test script not found"
        fi

    - name: Skip E2E tests
      id: e2e-skip
      if: inputs.run-e2e != 'true'
      shell: bash
      run: |
        echo "result=skipped" >> $GITHUB_OUTPUT

    - name: Collect logs on failure
      if: failure()
      shell: bash
      run: |
        cd $ZECKIT_DIR
        echo "Collecting diagnostic logs..."
        mkdir -p /tmp/zeckit-logs
        
        docker compose -f docker-compose.prebuilt.yml --profile ${{ inputs.backend }} logs zebra > /tmp/zeckit-logs/zebra.log 2>&1 || true
        
        if [[ "${{ inputs.backend }}" == "zaino" ]]; then
          docker compose -f docker-compose.prebuilt.yml --profile zaino logs zaino > /tmp/zeckit-logs/zaino.log 2>&1 || true
          docker compose -f docker-compose.prebuilt.yml --profile zaino logs zingo-wallet-zaino > /tmp/zeckit-logs/zingo-wallet.log 2>&1 || true
          docker compose -f docker-compose.prebuilt.yml --profile zaino logs faucet-zaino > /tmp/zeckit-logs/faucet.log 2>&1 || true
        else
          docker compose -f docker-compose.prebuilt.yml --profile lwd logs lightwalletd > /tmp/zeckit-logs/lightwalletd.log 2>&1 || true
          docker compose -f docker-compose.prebuilt.yml --profile lwd logs zingo-wallet-lwd > /tmp/zeckit-logs/zingo-wallet.log 2>&1 || true
          docker compose -f docker-compose.prebuilt.yml --profile lwd logs faucet-lwd > /tmp/zeckit-logs/faucet.log 2>&1 || true
        fi
        
        docker ps -a > /tmp/zeckit-logs/containers.log 2>&1 || true
        docker network ls > /tmp/zeckit-logs/networks.log 2>&1 || true
        
        echo "✓ Logs collected in /tmp/zeckit-logs/"
        ls -la /tmp/zeckit-logs/

    - name: Upload logs artifact
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: zeckit-logs-${{ github.run_number }}
        path: /tmp/zeckit-logs/
        retention-days: 7

    - name: Cleanup on failure
      if: failure()
      shell: bash
      run: |
        cd $ZECKIT_DIR
        echo "Cleaning up containers..."
        docker compose -f docker-compose.prebuilt.yml --profile ${{ inputs.backend }} down --remove-orphans || true
