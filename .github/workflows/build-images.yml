name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'docker/**'
      - 'faucet/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:  # Manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/zeckit

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false  # Continue building other images if one fails
      matrix:
        include:
          - image: zebra
            context: ./docker/zebra
            dockerfile: ./docker/zebra/Dockerfile
          - image: zaino
            context: ./docker/zaino
            dockerfile: ./docker/zaino/Dockerfile
          - image: zingo
            context: ./docker/zingo
            dockerfile: ./docker/zingo/Dockerfile
          - image: lightwalletd
            context: ./docker/lightwalletd
            dockerfile: ./docker/lightwalletd/Dockerfile
          - image: faucet
            context: ./faucet
            dockerfile: ./faucet/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
        timeout-minutes: 90

  update-compose:
    name: Verify Images
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Verify images exist
        run: |
          echo "Verifying pushed images..."
          for image in zebra zaino zingo faucet; do
            echo "Checking ghcr.io/${{ env.IMAGE_PREFIX }}-${image}:latest"
            docker pull ghcr.io/${{ env.IMAGE_PREFIX }}-${image}:latest || echo "Warning: ${image} not found"
          done
          echo "✓ Image verification complete"
