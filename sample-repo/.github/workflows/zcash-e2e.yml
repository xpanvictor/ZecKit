# ================================================
# ZecKit E2E Test Workflow
# ================================================
# This workflow demonstrates ZecKit integration with:
# - Backend matrix (lwd + zaino)
# - Golden E2E shielded transaction flows
# - Artifact collection on failure
# ================================================

name: ZecKit E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger

jobs:
  # ================================================
  # E2E Tests with Backend Matrix
  # ================================================
  e2e-test:
    name: E2E (${{ matrix.backend }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    # Continue other jobs even if one fails
    continue-on-error: ${{ matrix.experimental }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Lightwalletd - Production backend (must pass)
          - backend: lwd
            experimental: false
            name: lightwalletd
          # Zaino - Experimental Rust indexer
          - backend: zaino
            experimental: true
            name: zaino (experimental)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ============================================
      # Start ZecKit Devnet
      # ============================================
      - name: Start ZecKit Devnet
        id: devnet
        uses: xpanvictor/ZecKit@main
        with:
          backend: ${{ matrix.backend }}
          startup-timeout: '30'
          min-blocks: '101'
          run-e2e: 'true'

      # ============================================
      # Verify Devnet is Running
      # ============================================
      - name: Verify Zebra RPC
        run: |
          echo "Testing Zebra RPC at ${{ steps.devnet.outputs.zebra-rpc }}"
          curl -sf --max-time 10 \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":"1","method":"getblockcount","params":[]}' \
            ${{ steps.devnet.outputs.zebra-rpc }}
          echo ""
          echo "✓ Zebra RPC is responding"

      - name: Verify Faucet API
        run: |
          echo "Testing Faucet API at ${{ steps.devnet.outputs.faucet-api }}"
          curl -sf ${{ steps.devnet.outputs.faucet-api }}/health
          echo ""
          echo ""
          echo "Faucet stats:"
          curl -sf ${{ steps.devnet.outputs.faucet-api }}/stats | jq .
          echo ""
          echo "✓ Faucet API is responding"

      # ============================================
      # Run Custom Tests (Example)
      # ============================================
      - name: Run custom application tests
        run: |
          echo "================================================"
          echo "  Running Custom Tests"
          echo "================================================"
          echo ""
          echo "Devnet Information:"
          echo "  Zebra RPC:      ${{ steps.devnet.outputs.zebra-rpc }}"
          echo "  Faucet API:     ${{ steps.devnet.outputs.faucet-api }}"
          echo "  Faucet Address: ${{ steps.devnet.outputs.faucet-address }}"
          echo "  Block Height:   ${{ steps.devnet.outputs.block-height }}"
          echo "  E2E Result:     ${{ steps.devnet.outputs.e2e-result }}"
          echo ""
          
          # Example: Request funds from faucet
          echo "Requesting test funds..."
          # curl -X POST ${{ steps.devnet.outputs.faucet-api }}/request \
          #   -H "Content-Type: application/json" \
          #   -d '{"address": "YOUR_TEST_ADDRESS", "amount": 1.0}'
          
          echo "✓ Custom tests completed"

      # ============================================
      # Test Summary
      # ============================================
      - name: Test Summary
        if: always()
        run: |
          echo ""
          echo "================================================"
          echo "  Test Summary"
          echo "================================================"
          echo ""
          echo "Backend:    ${{ matrix.name }}"
          echo "E2E Result: ${{ steps.devnet.outputs.e2e-result }}"
          echo ""
          
          if [ "${{ steps.devnet.outputs.e2e-result }}" == "pass" ]; then
            echo "✓ All tests PASSED"
          elif [ "${{ steps.devnet.outputs.e2e-result }}" == "skipped" ]; then
            echo "○ E2E tests were skipped"
          else
            echo "✗ Tests FAILED - check artifacts for logs"
          fi

  # ================================================
  # Injected Failure Test (for artifact verification)
  # ================================================
  failure-test:
    name: Failure Artifact Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run on manual trigger or when specifically requested
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start ZecKit with invalid config (expect failure)
        id: devnet
        uses: xpanvictor/ZecKit@main
        continue-on-error: true
        with:
          backend: zaino
          startup-timeout: '2'  # Too short - will fail
          min-blocks: '101'
          run-e2e: 'false'

      - name: Verify failure produced artifacts
        if: always()
        run: |
          echo "================================================"
          echo "  Failure Artifact Verification"
          echo "================================================"
          echo ""
          echo "This job intentionally fails to verify artifact collection."
          echo "Check the 'Artifacts' section of this workflow run to verify"
          echo "that zeckit-logs-* was uploaded with diagnostic information."
          echo ""
          
          if [ "${{ steps.devnet.outcome }}" == "failure" ]; then
            echo "✓ Expected failure occurred - artifacts should be uploaded"
          else
            echo "⚠ Unexpected success - startup-timeout may need adjustment"
          fi
